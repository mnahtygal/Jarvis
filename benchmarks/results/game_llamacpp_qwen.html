<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Quake3-style Arena Shooter</title>
    <style>
        html, body { cursor: none; overflow: hidden; margin: 0; }
        #hud { position: absolute; bottom: 0; left: 0; right: 0; pointer-events: none; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="hud">
        <div id="crosshair"></div>
        <div id="hp">HP: 100</div>
        <div id="score">Score: 0</div>
        <div id="cooldown"></div>
        <div id="paused" style="display: none;">PAUSED</div>
    </div>
    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('canvas');
        const hud = document.getElementById('hud');
        const crosshair = document.getElementById('crosshair');
        const hp = document.getElementById('hp');
        const score = document.getElementById('score');
        const cooldown = document.getElementById('cooldown');
        const paused = document.getElementById('paused');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.setClearColor('#1A2230');

        const clock = new THREE.Clock();

        const keyMap = {};
        const botSize = new THREE.Vector3(0.7, 1.4, 0.7);

        document.addEventListener('keydown', e => {
            keyMap[e.key.toLowerCase()] = true;
            if (e.key === 'Shift') keyMap['shift'] = true;
        });

        document.addEventListener('keyup', e => {
            keyMap[e.key.toLowerCase()] = false;
            if (e.key === 'Shift') keyMap['shift'] = false;
        });
        let dt = 0, lastTime = 0, lastPointerLockRequest = 0;
        let player = { position: new THREE.Vector3(), velocity: new THREE.Vector3(), yaw: 0, pitch: 0, canJump: true };
        const playerSize = new THREE.Vector3(0.7, 3.4, 0.7);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x4A5360, roughness: 0.85, metalness: 0 });
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x545E6C, roughness: 0.85, metalness: 0 });
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x4A5360, roughness: 0.85, metalness: 0 });
        const botMaterial = new THREE.MeshStandardMaterial({ color: 0xE86A3C, roughness: 0.85, metalness: 0.2 });

        function randomUnitVector() {
            const v = new THREE.Vector3(
                Math.random() * 2 - 1,
                Math.random() * 2 - 1,
                Math.random() * 2 - 1
            );
            return v.normalize();
        }


        const gridGeometry = new THREE.PlaneGeometry(50, 50);
        const gridMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float uTime;
                varying vec2 vUv;
                void main() {
                    float d = abs(mod(vUv.x * 20.0, 1.0) - 0.5) + abs(mod(vUv.y * 20.0, 1.0) - 0.5);
                    gl_FragColor = vec4(vec3(0.6, 0.7, 0.8) * (1.0 - d * d * d), 0.8);
                }
            `,
            side: THREE.DoubleSide
        });

        function initScene() {
            const ground = new THREE.Mesh(gridGeometry, floorMaterial);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const walls = [
                { position: new THREE.Vector3(-25, 2, 0), size: new THREE.Vector3(50, 4, 1) },
                { position: new THREE.Vector3(25, 2, 0), size: new THREE.Vector3(50, 4, 1) },
                { position: new THREE.Vector3(0, 2, -25), size: new THREE.Vector3(1, 4, 50) },
                { position: new THREE.Vector3(0, 2, 25), size: new THREE.Vector3(1, 4, 50) }
            ];

            walls.forEach(wall => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(wall.size.x, wall.size.y, wall.size.z), wallMaterial);
                mesh.position.copy(wall.position);
                scene.add(mesh);
            });

            const coverBoxes = [
                { position: new THREE.Vector3(-10, 2, -10), size: new THREE.Vector3(2, 4, 2) },
                { position: new THREE.Vector3(10, 2, -10), size: new THREE.Vector3(2, 4, 2) },
                { position: new THREE.Vector3(-10, 2, 10), size: new THREE.Vector3(2, 4, 2) },
                { position: new THREE.Vector3(10, 2, 10), size: new THREE.Vector3(2, 4, 2) }
            ];

            coverBoxes.forEach(box => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(box.size.x, box.size.y, box.size.z), botMaterial);
                mesh.position.copy(box.position);
                scene.add(mesh);
            });

            const ramps = [
                { position: new THREE.Vector3(-15, 2, 0), size: new THREE.Vector3(5, 2, 1), slope: 0.1 },
                { position: new THREE.Vector3(15, 2, 0), size: new THREE.Vector3(5, 2, 1), slope: -0.1 }
            ];

            ramps.forEach(ramp => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(ramp.size.x, ramp.size.y, ramp.size.z), wallMaterial);
                mesh.position.copy(ramp.position);
                mesh.rotation.x = ramp.slope;
                scene.add(mesh);

                const feetProbe = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true }));
                feetProbe.position.copy(ramp.position).add(new THREE.Vector3(0, 0.1, 0));
                feetProbe.rotation.x = ramp.slope;
                scene.add(feetProbe);
            });

            const bot1 = createBot();
            bot1.position.set(-10, 2, -10);
            scene.add(bot1);

            const bot2 = createBot();
            bot2.position.set(10, 2, -10);
            scene.add(bot2);

            const bot3 = createBot();
            bot3.position.set(0, 2, 10);
            scene.add(bot3);

            const railgun = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 100, 32), new THREE.MeshBasicMaterial({ color: 0x00FFFF, emissive: 0x808080, emissiveIntensity: 1.0, side: THREE.FrontSide }));
            railgun.position.set(0, 1.6, 0);
            railgun.rotation.x = -Math.PI / 2;
            scene.add(railgun);

            const muzzleFlash = new THREE.PointLight(0xFFFFFF, 10, 0.5, 2);
            muzzleFlash.position.set(0, 1.6, 0.1);
            scene.add(muzzleFlash);

            const cameraPunch = new THREE.Vector3(0, 0, 0);
            const cameraOffset = new THREE.Vector3(0, -0.12, 0);

            const ambientLight = new THREE.AmbientLight(0x404858, 0.25);
            const directionalLight = new THREE.DirectionalLight(0xFFFFFF, 0.95);
            directionalLight.position.set(0, 10, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.near = 1;
            directionalLight.shadow.camera.far = 100;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            const hemisphereLight = new THREE.HemisphereLight(0xCFE3F5, 0x3B424E, 0.85);
            scene.add(ambientLight, directionalLight, hemisphereLight);

            document.addEventListener('click', () => {
                if (document.pointerLockElement !== canvas) {
                    canvas.requestPointerLock();
                }
            });

            document.addEventListener('pointerlockchange', () => {
                if (!document.pointerLockElement) {
                    paused.style.display = 'block';
                    renderer.domElement.style.cursor = 'none';
                } else {
                    paused.style.display = 'none';
                    renderer.domElement.style.cursor = 'none';
                }
            });

            document.addEventListener('mousemove', e => {
                if (document.pointerLockElement === canvas) {
                    const sensitivity = 0.0022;
                    player.yaw -= e.movementX * sensitivity;
                    player.pitch -= e.movementY * sensitivity;
                    player.pitch = Math.max(-Math.PI / 2 + 0.001, Math.min(Math.PI / 2 - 0.001, player.pitch));
                    camera.rotation.order = 'YXZ';
                    camera.rotation.y = player.yaw;
                    camera.rotation.x = player.pitch;
                    camera.rotation.z = 0;
                }
            });

            document.addEventListener('keydown', e => {
                if (e.key === ' ') {
                    if (player.canJump) {
                        player.velocity.y = 9.0;
                        player.canJump = false;
                    }
                } else if (e.key === 'Shift') {
                    player.velocity.set(0, 0, 0);
                } else if (e.key === 'Escape') {
                    paused.style.display = paused.style.display === 'none' ? 'block' : 'none';
                    renderer.domElement.style.cursor = paused.style.display === 'none' ? 'none' : 'default';
                }
            });

            document.addEventListener('keyup', e => {
                if (e.key === 'Shift') {
                    player.velocity.set(0, 0, 0);
                } else if (e.key === 'Escape') {
                    paused.style.display = paused.style.display === 'none' ? 'block' : 'none';
                    renderer.domElement.style.cursor = paused.style.display === 'none' ? 'none' : 'default';
                }
            });

            function createBot() {
                const bot = new THREE.Object3D();
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), botMaterial);
                head.position.set(0, 0.5, 0);
                bot.add(head);

                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), botMaterial);
                torso.position.set(0, 0, 0);
                bot.add(torso);

                const arm1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.0, 0.1), botMaterial);
                arm1.position.set(-0.2, 0.5, 0);
                bot.add(arm1);

                const arm2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.0, 0.1), botMaterial);
                arm2.position.set(0.2, 0.5, 0);
                bot.add(arm2);

                const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.0, 0.1), botMaterial);
                leg1.position.set(-0.2, -0.5, 0);
                bot.add(leg1);

                const leg2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.0, 0.1), botMaterial);
                leg2.position.set(0.2, -0.5, 0);
                bot.add(leg2);

                return bot;
            }

            function updatePlayer() {
                const input = new THREE.Vector3();
                if (keyMap['w']) input.z -= 1;
                if (keyMap['a']) input.x -= 1;
                if (keyMap['s']) input.z += 1;
                if (keyMap['d']) input.x += 1;
                if (input.length() > 0) {
                    input.applyAxisAngle(camera.up, -player.yaw);
                    input.normalize().multiplyScalar(player.velocity.length() > 7 ? 11 : 7);
                }

                player.velocity.add(input);
                player.velocity.y -= 28 * dt;

                const friction = player.velocity.length() > 7 ? 12 : 1;
                player.velocity.sub(input).multiplyScalar(1 - friction * dt);

                player.position.add(player.velocity.clone().multiplyScalar(dt));

                const ray = new THREE.Raycaster(player.position, new THREE.Vector3(0, -1, 0));
                const hits = ray.intersectObjects(scene.children.filter(obj => obj.isMesh));
                if (hits.length > 0) {
                    const hit = hits[0];
                    if (hit.distance < playerSize.y * 0.5) {
                        player.canJump = true;
                        player.position.y = hit.point.y + playerSize.y * 0.5;
                        cameraOffset.y = 0;
                    }
                }

                const depenetration = new THREE.Vector3();
                if (player.position.x < -25 + playerSize.x * 0.5) depenetration.x = -25 + playerSize.x * 0.5 - player.position.x;
                if (player.position.x > 25 - playerSize.x * 0.5) depenetration.x = 25 - playerSize.x * 0.5 - player.position.x;
                if (player.position.z < -25 + playerSize.z * 0.5) depenetration.z = -25 + playerSize.z * 0.5 - player.position.z;
                if (player.position.z > 25 - playerSize.z * 0.5) depenetration.z = 25 - playerSize.z * 0.5 - player.position.z;
                if (player.position.y < -25 + playerSize.y * 0.5) depenetration.y = -25 + playerSize.y * 0.5 - player.position.y;
                if (player.position.y > 25 - playerSize.y * 0.5) depenetration.y = 25 - playerSize.y * 0.5 - player.position.y;

                player.position.add(depenetration);

                const botBodies = scene.children.filter(obj => obj.isMesh && obj.material === botMaterial);
                for (let bot of botBodies) {
                    const distance = player.position.distanceTo(bot.position);
                    if (distance < playerSize.x * 0.5 + botSize.x * 0.5) {
                        const direction = new THREE.Vector3().subVectors(player.position, bot.position).normalize();
                        const overlap = playerSize.x * 0.5 + botSize.x * 0.5 - distance;
                        bot.position.add(direction.multiplyScalar(overlap));
                    }
                }
            }

            function updateBots() {
                const botBodies = scene.children.filter(obj => obj.isMesh && obj.material === botMaterial);
                for (let bot of botBodies) {
                    const botSize = new THREE.Vector3(0.7, 1.4, 0.7);
                    const direction = new THREE.Vector3().subVectors(player.position, bot.position).normalize();
                    const distance = player.position.distanceTo(bot.position);
                    if (distance < botSize.x * 0.5 + playerSize.x * 0.5) {
                        const aimAngle = Math.atan2(direction.y, direction.x);
                        bot.rotation.y = aimAngle;
                        const aimDistance = Math.max(0, botSize.x * 0.5 + playerSize.x * 0.5 - distance);
                        const targetPos = bot.position.clone().add(direction.multiplyScalar(aimDistance));
                        const ray = new THREE.Raycaster(bot.position, new THREE.Vector3().subVectors(targetPos, bot.position).normalize());
                        const hits = ray.intersectObjects(scene.children.filter(obj => obj.isMesh));
                        if (hits.length === 0) {
                            bot.position.add(direction.multiplyScalar(0.1));
                        }
                    }
                }
            }

            function fireRailgun() {
                const ray = new THREE.Raycaster(player.position, camera.getWorldDirection(new THREE.Vector3()));
                const hits = ray.intersectObjects(scene.children.filter(obj => obj.isMesh));
                if (hits.length > 0) {
                    const hit = hits[0];
                    const impactPosition = hit.point;
                    const impactNormal = hit.face.normal;
                    const impactMaterial = hit.object.material;

                    const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 500, 32), new THREE.MeshBasicMaterial({ color: 0x00FFFF, emissive: 0x808080, emissiveIntensity: 1.0, side: THREE.FrontSide }));
                    beam.position.copy(impactPosition);
                    beam.rotation.x = Math.PI / 2;
                    beam.rotation.z = Math.atan2(impactNormal.x, impactNormal.z);
                    scene.add(beam);

                    const beamCore = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 500, 32), new THREE.MeshBasicMaterial({ color: 0x00FFFF, emissive: 0x808080, emissiveIntensity: 1.0, side: THREE.FrontSide }));
                    beamCore.position.copy(impactPosition);
                    beamCore.rotation.x = Math.PI / 2;
                    beamCore.rotation.z = Math.atan2(impactNormal.x, impactNormal.z);
                    scene.add(beamCore);

                    const particles = new THREE.Group();
                    for (let i = 0; i < 40; i++) {
                        const particle = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.01, 0.01), new THREE.MeshBasicMaterial({ color: 0xFFFFFF, side: THREE.FrontSide }));
                        particle.position.copy(impactPosition);
                        particle.scale.set(Math.random() * 0.5, Math.random() * 0.5, Math.random() * 0.5);
                        particle.velocity = randomUnitVector().multiplyScalar(Math.random() * 5);
                        particle.angularVelocity = randomUnitVector().multiplyScalar(Math.random() * 10);
                        particles.add(particle);
                    }
                    scene.add(particles);

                    const flash = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.TextureLoader().load('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACAYAAACNbyblAAAAHElEQVQI12P4//8/w38GIAXDIBKE0DHxgljNBAAO9TXL0Y4OHwAAAABJRU5ErkJggg=='), color: 0xFFFFFF }));
                    flash.position.copy(impactPosition);
                    flash.scale.set(1, 1, 1);
                    scene.add(flash);

                    const shockwave = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshBasicMaterial({ color: 0xFFFFFF, side: THREE.FrontSide }));
                    shockwave.position.copy(impactPosition);
                    shockwave.scale.set(1, 1, 1);
                    shockwave.rotation.x = -Math.PI / 2;
                    scene.add(shockwave);

                    const dust = new THREE.Group();
                    for (let i = 0; i < 10; i++) {
                        const particle = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.01, 0.01), new THREE.MeshBasicMaterial({ color: 0x808080, emissive: 0x808080, emissiveIntensity: 1.0, side: THREE.FrontSide }));
                        particle.position.copy(impactPosition);
                        particle.scale.set(Math.random() * 0.1, Math.random() * 0.1, Math.random() * 0.1);
                        particle.velocity = randomUnitVector().multiplyScalar(Math.random() * 5);
                        particle.angularVelocity = randomUnitVector().multiplyScalar(Math.random() * 10);
                        dust.add(particle);
                    }
                    scene.add(dust);
                }
            }

            function killBot(bot) {
                const botParts = bot.children;
                botParts.forEach(part => {
                    scene.remove(part);
                });

                const particles = new THREE.Group();
                for (let i = 0; i < 40; i++) {
                    const particle = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.01, 0.01), new THREE.MeshBasicMaterial({ color: 0xFFFFFF, side: THREE.FrontSide }));
                    particle.position.copy(bot.position);
                    particle.scale.set(Math.random() * 0.5, Math.random() * 0.5, Math.random() * 0.5);
                    particle.velocity = randomUnitVector().multiplyScalar(Math.random() * 5);
                    particle.angularVelocity = randomUnitVector().multiplyScalar(Math.random() * 10);
                    particles.add(particle);
                }
                scene.add(particles);

                const shockwave = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshBasicMaterial({ color: 0xFFFFFF, side: THREE.FrontSide }));
                shockwave.position.copy(bot.position);
                shockwave.scale.set(1, 1, 1);
                shockwave.rotation.x = -Math.PI / 2;
                scene.add(shockwave);
            }

            function spawnHitFeedback() {
                const particles = new THREE.Group();
                for (let i = 0; i < 40; i++) {
                    const particle = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.01, 0.01), new THREE.MeshBasicMaterial({ color: 0xFFFFFF, side: THREE.FrontSide }));
                    particle.position.set(0, 0, 0);
                    particle.scale.set(Math.random() * 0.5, Math.random() * 0.5, Math.random() * 0.5);
                    particle.velocity = randomUnitVector().multiplyScalar(Math.random() * 5);
                    particle.angularVelocity = randomUnitVector().multiplyScalar(Math.random() * 10);
                    particles.add(particle);
                }
                scene.add(particles);

                const flash = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.TextureLoader().load('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACAYAAACNbyblAAAAHElEQVQI12P4//8/w38GIAXDIBKE0DHxgljNBAAO9TXL0Y4OHwAAAABJRU5ErkJggg=='), color: 0xFFFFFF }));
                flash.position.set(0, 0, 0);
                flash.scale.set(1, 1, 1);
                scene.add(flash);

                const shockwave = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshBasicMaterial({ color: 0xFFFFFF, side: THREE.FrontSide }));
                shockwave.position.set(0, 0, 0);
                shockwave.scale.set(1, 1, 1);
                shockwave.rotation.x = -Math.PI / 2;
                scene.add(shockwave);
            }

            function updateDebris() {
		const debris = scene.children.filter(obj => obj.isMesh && obj.velocity && 		obj.angularVelocity);
                for (let particle of debris) {
                    particle.position.add(particle.velocity.clone().multiplyScalar(dt));
                    particle.rotation.add(particle.angularVelocity.clone().multiplyScalar(dt));
                    particle.scale.multiplyScalar(1 - 0.1 * dt);
                    if (particle.scale.x <= 0) {
                        scene.remove(particle);
                    }
                }
            }

            function render() {
                const deltaTime = clock.getDelta();
                dt = Math.min(deltaTime, 0.05);

                updatePlayer();
                updateBots();
                updateDebris();

                renderer.render(scene, camera);
            }

            function gameLoop() {
                requestAnimationFrame(gameLoop);
                render();
            }

            gameLoop();
        }

        initScene();
    </script>
</body>
</html>
